name: Lint JSON

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Validate JSON files
      run: |
        shopt -s nullglob
        for file in bucket/*.json; do
          if [ ! -f "$file" ]; then continue; fi
          if ! jq . "$file" > /dev/null; then
            echo "::error file=$file::Invalid JSON format"
            exit 1
          fi
        done

    - name: Check for Scoop manifest requirements
      run: |
        shopt -s nullglob
        for file in bucket/*.json; do
          if [ ! -f "$file" ]; then continue; fi
          # Basic check for required fields
          if ! jq -e '.version and .description and .homepage' "$file" > /dev/null; then
            echo "::error file=$file::Missing required manifest fields (version, description, or homepage)"
            exit 1
          fi
        done
